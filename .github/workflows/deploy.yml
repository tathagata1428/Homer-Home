name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, 'feature/**']

# Cloudflare Pages deploys automatically via its native GitHub integration.
# This workflow is intentionally a no-op — it exists only to show a green
# check on pull requests. Actual deployment is handled by Cloudflare directly.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deployment handled by Cloudflare Pages
        run: echo "Cloudflare Pages native integration handles deployment on push."
