<?xml version="1.0" encoding="UTF-8"?>
<!-- Homer Screenshot 3: Focus Timer — 1080×1920 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF"/><stop offset="100%" stop-color="#CC00FF"/>
    </linearGradient>
    <linearGradient id="pinkPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0066"/><stop offset="100%" stop-color="#CC00FF"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0066"/><stop offset="100%" stop-color="#CC00FF"/>
    </linearGradient>
    <linearGradient id="fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B0018" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0B0018" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ringGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="1080" height="1920" fill="#0B0018"/>

  <!-- STATUS BAR -->
  <text x="60" y="46" font-family="Arial" font-size="30" font-weight="600" fill="#F0F0FF">9:41</text>
  <rect x="900" y="36" width="9"  height="10" rx="2" fill="#F0F0FF" opacity="0.6"/>
  <rect x="914" y="30" width="9"  height="16" rx="2" fill="#F0F0FF" opacity="0.6"/>
  <rect x="928" y="22" width="9"  height="24" rx="2" fill="#F0F0FF" opacity="0.8"/>
  <rect x="942" y="14" width="9"  height="32" rx="2" fill="#F0F0FF"/>
  <rect x="964"  y="18" width="72" height="30" rx="5" fill="none" stroke="#F0F0FF" stroke-width="2.5"/>
  <rect x="1036" y="26" width="7"  height="14" rx="2" fill="#F0F0FF" opacity="0.7"/>
  <rect x="968"  y="22" width="57" height="22" rx="3" fill="#F0F0FF" opacity="0.9"/>

  <!-- PAGE TITLE -->
  <text x="540" y="118" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="48"
    font-weight="900" letter-spacing="8" fill="url(#cyanGrad)">FOCUS</text>

  <!-- Session indicator -->
  <text x="540" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="26"
    fill="#888899" letter-spacing="3">SESSION  3  OF  4</text>

  <!-- Session dots -->
  <circle cx="490" cy="192" r="9" fill="#FF0066" filter="url(#softglow)"/>
  <circle cx="520" cy="192" r="9" fill="#FF0066" filter="url(#softglow)"/>
  <circle cx="550" cy="192" r="9" fill="#FF0066" filter="url(#softglow)"/>
  <circle cx="580" cy="192" r="9" fill="#444466"/>

  <!-- TIMER RING — center (540, 720), r=295 -->
  <!-- Track ring -->
  <circle cx="540" cy="740" r="295" fill="none" stroke="#220040" stroke-width="28"/>
  <!-- Progress ring (60% = 1112 / 1854 dash) — glow pass -->
  <circle cx="540" cy="740" r="295" fill="none"
    stroke="url(#ringGrad)" stroke-width="28"
    stroke-dasharray="1113 741"
    stroke-linecap="round"
    transform="rotate(-90, 540, 740)"
    filter="url(#ringGlow)"/>
  <!-- Progress ring sharp -->
  <circle cx="540" cy="740" r="295" fill="none"
    stroke="url(#ringGrad)" stroke-width="28"
    stroke-dasharray="1113 741"
    stroke-linecap="round"
    transform="rotate(-90, 540, 740)"/>

  <!-- Bright dot at arc tip — approx at 60% = top - 60% CW -->
  <!-- 60% of 360° = 216°, start at -90° → end at 126° -->
  <!-- x = 540 + 295*cos(126°) = 540 + 295*(-0.588) = 540-173 = 367 -->
  <!-- y = 740 + 295*sin(126°) = 740 + 295*0.809 = 740+239 = 979 -->
  <circle cx="367" cy="979" r="16" fill="#FF0066" filter="url(#glow)"/>
  <circle cx="367" cy="979" r="8"  fill="white"/>

  <!-- Timer display -->
  <text x="540" y="700" text-anchor="middle"
    font-family="'Arial Black',Arial,sans-serif" font-size="118" font-weight="900"
    letter-spacing="-2" fill="url(#pinkPurple)" filter="url(#glow)">14:32</text>
  <text x="540" y="780" text-anchor="middle" font-family="Arial,sans-serif" font-size="28"
    fill="#888899" letter-spacing="6">FOCUS SESSION</text>

  <!-- Ambient badge -->
  <rect x="440" y="820" width="200" height="36" rx="18" fill="#00FFFF14"/>
  <rect x="440" y="820" width="200" height="36" rx="18" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>
  <circle cx="466" cy="838" r="6" fill="#00FFFF"/>
  <text x="540" y="845" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="#00FFFF">Rain Sounds ON</text>

  <!-- TASK CARD -->
  <rect x="40" y="1075" width="1000" height="168" rx="20" fill="#110025"/>
  <rect x="40" y="1075" width="1000" height="168" rx="20" fill="none" stroke="#FF0066" stroke-width="1.2" opacity="0.30"/>
  <rect x="40" y="1075" width="6" height="168" rx="3" fill="#FF0066"/>
  <text x="80" y="1130" font-family="Arial,sans-serif" font-size="24" letter-spacing="3" fill="#FF0066" opacity="0.8">CURRENT TASK</text>
  <text x="80" y="1184" font-family="'Arial Black',Arial,sans-serif" font-size="40" font-weight="700" fill="#F0F0FF">Review API Architecture</text>
  <text x="80" y="1228" font-family="Arial,sans-serif" font-size="26" fill="#888899">Kanban · In Progress · Due tomorrow</text>

  <!-- CONTROL BUTTONS -->
  <!-- Skip -->
  <rect x="40" y="1270" width="290" height="92" rx="20" fill="#110025"/>
  <rect x="40" y="1270" width="290" height="92" rx="20" fill="none" stroke="#444466" stroke-width="1.5"/>
  <text x="185" y="1326" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" letter-spacing="2" fill="#888899">SKIP</text>

  <!-- Pause (primary) -->
  <rect x="350" y="1258" width="380" height="116" rx="26" fill="#FF0066" opacity="0.12"/>
  <rect x="350" y="1258" width="380" height="116" rx="26" fill="none" stroke="#FF0066" stroke-width="2.5" filter="url(#softglow)"/>
  <!-- Pause icon -->
  <rect x="495" y="1292" width="22" height="48" rx="4" fill="#FF0066"/>
  <rect x="533" y="1292" width="22" height="48" rx="4" fill="#FF0066"/>
  <text x="540" y="1398" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" letter-spacing="4" fill="#FF0066">PAUSE</text>

  <!-- Stop -->
  <rect x="750" y="1270" width="290" height="92" rx="20" fill="#110025"/>
  <rect x="750" y="1270" width="290" height="92" rx="20" fill="none" stroke="#444466" stroke-width="1.5"/>
  <text x="895" y="1326" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" letter-spacing="2" fill="#888899">STOP</text>

  <!-- Progress info -->
  <text x="540" y="1430" text-anchor="middle" font-family="Arial,sans-serif" font-size="26"
    fill="#888899">25 min session · 60% complete · 3 sessions today</text>

  <!-- Fade -->
  <rect x="0" y="1700" width="1080" height="120" fill="url(#fade)"/>

  <!-- BOTTOM NAV -->
  <rect x="0" y="1820" width="1080" height="100" fill="#0D001E"/>
  <line x1="0" y1="1820" x2="1080" y2="1820" stroke="#2A0050" stroke-width="1.5"/>
  <!-- Focus selected -->
  <g transform="translate(108,1860)">
    <path d="M0,-22 L24,0 L16,0 L16,22 L6,22 L6,10 L-6,10 L-6,22 L-16,22 L-16,0 L-24,0 Z" fill="#444466"/>
    <text y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" letter-spacing="1" fill="#444466">HOME</text>
  </g>
  <g transform="translate(324,1860)">
    <circle r="22" fill="none" stroke="#FF0066" stroke-width="2.5" filter="url(#softglow)"/>
    <line x1="0" y1="-13" x2="0" y2="0" stroke="#FF0066" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="10" y2="-8" stroke="#FF0066" stroke-width="2.5"/>
    <text y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" letter-spacing="1" fill="#FF0066">FOCUS</text>
  </g>
  <g transform="translate(540,1860)">
    <rect x="-16" y="-4" width="32" height="26" rx="4" fill="none" stroke="#444466" stroke-width="2.5"/>
    <path d="M-10,-4 L-10,-18 A10,10 0 0,1 10,-18 L10,-4" fill="none" stroke="#444466" stroke-width="2.5"/>
    <circle r="5" cy="9" fill="#444466"/>
    <text y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" letter-spacing="1" fill="#444466">VAULT</text>
  </g>
  <g transform="translate(756,1860)">
    <path d="M-18,-20 L18,-20 L18,8 L8,8 L0,22 L0,8 L-18,8 Z" fill="none" stroke="#444466" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="-8" cy="-6" r="3" fill="#444466"/>
    <circle cx="0"  cy="-6" r="3" fill="#444466"/>
    <circle cx="8"  cy="-6" r="3" fill="#444466"/>
    <text y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" letter-spacing="1" fill="#444466">JOEY</text>
  </g>
  <g transform="translate(972,1860)">
    <circle cx="-20" r="6" fill="#444466"/>
    <circle r="6" fill="#444466"/>
    <circle cx="20" r="6" fill="#444466"/>
    <text y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" letter-spacing="1" fill="#444466">MORE</text>
  </g>
</svg>
