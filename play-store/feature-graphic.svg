<?xml version="1.0" encoding="UTF-8"?>
<!-- Homer Feature Graphic — 1024×500 — Play Store Banner -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <!-- Background radial -->
    <radialGradient id="bg" cx="50%" cy="36%" r="72%">
      <stop offset="0%"   stop-color="#270058"/>
      <stop offset="100%" stop-color="#0B0018"/>
    </radialGradient>
    <!-- Title gradient (pink → purple → cyan) -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF0066"/>
      <stop offset="48%"  stop-color="#CC00FF"/>
      <stop offset="100%" stop-color="#00FFFF"/>
    </linearGradient>
    <!-- Sun gradient (pink → orange → transparent gold) -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FF0066"/>
      <stop offset="55%"  stop-color="#FF4400"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Floor colour tint -->
    <linearGradient id="floorGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FF0066" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FF0066" stop-opacity="0.14"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="titleGlow" x="-40%" y="-80%" width="180%" height="360%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sunHalo" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sunGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lineGlow" x="-5%" y="-1000%" width="110%" height="3000%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Grid clip (below horizon) -->
    <clipPath id="gridClip">
      <rect x="0" y="283" width="1024" height="217"/>
    </clipPath>
    <!-- Sun scanline clip -->
    <clipPath id="sunClip">
      <ellipse cx="512" cy="281" rx="90" ry="46"/>
    </clipPath>
  </defs>

  <!-- ── BACKGROUND ───────────────────────────────────────────────── -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- ── STARS ────────────────────────────────────────────────────── -->
  <g fill="#FFFFFF">
    <circle cx="45"  cy="28"  r="1.5" opacity="0.70"/>
    <circle cx="118" cy="82"  r="1.0" opacity="0.50"/>
    <circle cx="203" cy="44"  r="1.5" opacity="0.60"/>
    <circle cx="315" cy="18"  r="1.0" opacity="0.50"/>
    <circle cx="388" cy="68"  r="2.0" opacity="0.65"/>
    <circle cx="452" cy="33"  r="1.0" opacity="0.40"/>
    <circle cx="548" cy="52"  r="1.5" opacity="0.55"/>
    <circle cx="625" cy="14"  r="1.0" opacity="0.50"/>
    <circle cx="702" cy="58"  r="2.0" opacity="0.65"/>
    <circle cx="783" cy="29"  r="1.5" opacity="0.60"/>
    <circle cx="852" cy="77"  r="1.0" opacity="0.40"/>
    <circle cx="921" cy="38"  r="1.5" opacity="0.70"/>
    <circle cx="982" cy="22"  r="1.0" opacity="0.50"/>
    <circle cx="72"  cy="118" r="1.0" opacity="0.38"/>
    <circle cx="168" cy="148" r="1.5" opacity="0.45"/>
    <circle cx="255" cy="102" r="1.0" opacity="0.38"/>
    <circle cx="432" cy="128" r="1.0" opacity="0.38"/>
    <circle cx="592" cy="108" r="1.5" opacity="0.45"/>
    <circle cx="734" cy="138" r="1.0" opacity="0.38"/>
    <circle cx="872" cy="118" r="1.5" opacity="0.45"/>
    <circle cx="953" cy="152" r="1.0" opacity="0.38"/>
    <circle cx="28"  cy="198" r="1.0" opacity="0.28"/>
    <circle cx="148" cy="218" r="1.5" opacity="0.35"/>
    <circle cx="342" cy="188" r="1.0" opacity="0.28"/>
    <circle cx="482" cy="212" r="1.0" opacity="0.28"/>
    <circle cx="664" cy="198" r="1.5" opacity="0.35"/>
    <circle cx="812" cy="182" r="1.0" opacity="0.28"/>
    <circle cx="994" cy="208" r="1.5" opacity="0.35"/>
  </g>

  <!-- ── SUN ───────────────────────────────────────────────────────── -->
  <!-- Outer halo (wide purple bleed) -->
  <ellipse cx="512" cy="283" rx="230" ry="72" fill="#CC00FF" opacity="0.10" filter="url(#sunHalo)"/>
  <!-- Mid halo (pink) -->
  <ellipse cx="512" cy="283" rx="155" ry="52" fill="#FF0066" opacity="0.14" filter="url(#sunHalo)"/>
  <!-- Sun body -->
  <ellipse cx="512" cy="281" rx="90" ry="46" fill="url(#sunGrad)" filter="url(#sunGlow)"/>
  <!-- Sun scanlines (dark stripes across the sun — classic synthwave) -->
  <g clip-path="url(#sunClip)" opacity="0.55">
    <rect x="422" y="285" width="180" height="2.5" fill="#0B0018"/>
    <rect x="422" y="291" width="180" height="2.5" fill="#0B0018"/>
    <rect x="422" y="297" width="180" height="2.5" fill="#0B0018"/>
    <rect x="422" y="303" width="180" height="2.5" fill="#0B0018"/>
    <rect x="422" y="309" width="180" height="2.5" fill="#0B0018"/>
    <rect x="422" y="315" width="180" height="2.5" fill="#0B0018"/>
    <rect x="422" y="321" width="180" height="2.5" fill="#0B0018"/>
  </g>

  <!-- ── HORIZON ──────────────────────────────────────────────────── -->
  <rect x="0" y="279" width="1024" height="5" fill="#FF0066" opacity="0.90" filter="url(#lineGlow)"/>
  <rect x="0" y="282" width="1024" height="1" fill="#FFBBCC" opacity="0.55"/>

  <!-- ── PERSPECTIVE GRID ─────────────────────────────────────────── -->
  <g clip-path="url(#gridClip)">
    <!-- Floor colour tint -->
    <rect x="0" y="283" width="1024" height="217" fill="url(#floorGlow)"/>

    <!-- Vertical lines — all radiate from vanishing point (512, 283) -->
    <g stroke="#FF0066" stroke-width="0.9" opacity="0.44">
      <line x1="512" y1="283" x2="0"    y2="500"/>
      <line x1="512" y1="283" x2="64"   y2="500"/>
      <line x1="512" y1="283" x2="128"  y2="500"/>
      <line x1="512" y1="283" x2="192"  y2="500"/>
      <line x1="512" y1="283" x2="256"  y2="500"/>
      <line x1="512" y1="283" x2="320"  y2="500"/>
      <line x1="512" y1="283" x2="384"  y2="500"/>
      <line x1="512" y1="283" x2="448"  y2="500"/>
      <line x1="512" y1="283" x2="512"  y2="500"/>
      <line x1="512" y1="283" x2="576"  y2="500"/>
      <line x1="512" y1="283" x2="640"  y2="500"/>
      <line x1="512" y1="283" x2="704"  y2="500"/>
      <line x1="512" y1="283" x2="768"  y2="500"/>
      <line x1="512" y1="283" x2="832"  y2="500"/>
      <line x1="512" y1="283" x2="896"  y2="500"/>
      <line x1="512" y1="283" x2="960"  y2="500"/>
      <line x1="512" y1="283" x2="1024" y2="500"/>
    </g>

    <!-- Horizontal cuts — t = (y-283)/217, dx = 512×t -->
    <!-- y=293: t=0.046 → dx=24 -->
    <line x1="488" y1="293" x2="536"  y2="293" stroke="#FF0066" stroke-width="0.9" opacity="0.40"/>
    <!-- y=306: t=0.106 → dx=54 -->
    <line x1="458" y1="306" x2="566"  y2="306" stroke="#FF0066" stroke-width="0.9" opacity="0.40"/>
    <!-- y=323: t=0.184 → dx=94 -->
    <line x1="418" y1="323" x2="606"  y2="323" stroke="#FF0066" stroke-width="0.9" opacity="0.40"/>
    <!-- y=347: t=0.295 → dx=151 -->
    <line x1="361" y1="347" x2="663"  y2="347" stroke="#FF0066" stroke-width="0.9" opacity="0.40"/>
    <!-- y=381: t=0.451 → dx=231 -->
    <line x1="281" y1="381" x2="743"  y2="381" stroke="#FF0066" stroke-width="0.9" opacity="0.40"/>
    <!-- y=432: t=0.686 → dx=351 -->
    <line x1="161" y1="432" x2="863"  y2="432" stroke="#FF0066" stroke-width="0.9" opacity="0.40"/>
    <!-- y=500: full width -->
    <line x1="0"   y1="500" x2="1024" y2="500" stroke="#FF0066" stroke-width="0.9" opacity="0.40"/>
  </g>

  <!-- ── TITLE ─────────────────────────────────────────────────────── -->
  <!-- Glow pass -->
  <text x="512" y="160"
    font-family="'Arial Black','Impact','Helvetica Neue',Arial,sans-serif"
    font-size="118" font-weight="900" text-anchor="middle" letter-spacing="20"
    fill="url(#titleGrad)" filter="url(#titleGlow)">HOMER</text>
  <!-- Sharp pass -->
  <text x="512" y="160"
    font-family="'Arial Black','Impact','Helvetica Neue',Arial,sans-serif"
    font-size="118" font-weight="900" text-anchor="middle" letter-spacing="20"
    fill="url(#titleGrad)">HOMER</text>

  <!-- ── TAGLINE ──────────────────────────────────────────────────── -->
  <!-- Decorative side lines -->
  <line x1="82"  y1="194" x2="322" y2="194" stroke="#00FFFF" stroke-width="1" opacity="0.32" filter="url(#lineGlow)"/>
  <line x1="702" y1="194" x2="942" y2="194" stroke="#00FFFF" stroke-width="1" opacity="0.32" filter="url(#lineGlow)"/>
  <!-- Tagline text -->
  <text x="512" y="202"
    font-family="Arial,'Helvetica Neue',sans-serif"
    font-size="17" font-weight="400" text-anchor="middle" letter-spacing="7"
    fill="#00FFFF" opacity="0.88">YOUR PERSONAL COMMAND CENTER</text>

  <!-- ── FEATURE CHIPS ─────────────────────────────────────────────── -->
  <!-- 6 chips × 108px + 5 gaps × 12px = 708px total, start x=158 -->
  <g font-family="Arial,'Helvetica Neue',sans-serif" font-size="10" font-weight="700" letter-spacing="2.5">
    <!-- HABITS -->
    <rect x="158" y="220" width="108" height="26" rx="13"
      fill="#FF0066" fill-opacity="0.06" stroke="#FF0066" stroke-width="1" opacity="0.70"/>
    <text x="212" y="237" text-anchor="middle" fill="#FF0066" opacity="0.92">HABITS</text>
    <!-- GOALS -->
    <rect x="278" y="220" width="108" height="26" rx="13"
      fill="#CC00FF" fill-opacity="0.06" stroke="#CC00FF" stroke-width="1" opacity="0.70"/>
    <text x="332" y="237" text-anchor="middle" fill="#CC00FF" opacity="0.92">GOALS</text>
    <!-- FOCUS -->
    <rect x="398" y="220" width="108" height="26" rx="13"
      fill="#FF0066" fill-opacity="0.06" stroke="#FF0066" stroke-width="1" opacity="0.70"/>
    <text x="452" y="237" text-anchor="middle" fill="#FF0066" opacity="0.92">FOCUS</text>
    <!-- VAULT -->
    <rect x="518" y="220" width="108" height="26" rx="13"
      fill="#00FFFF" fill-opacity="0.05" stroke="#00FFFF" stroke-width="1" opacity="0.70"/>
    <text x="572" y="237" text-anchor="middle" fill="#00FFFF" opacity="0.92">VAULT</text>
    <!-- AI JOEY -->
    <rect x="638" y="220" width="108" height="26" rx="13"
      fill="#CC00FF" fill-opacity="0.06" stroke="#CC00FF" stroke-width="1" opacity="0.70"/>
    <text x="692" y="237" text-anchor="middle" fill="#CC00FF" opacity="0.92">AI JOEY</text>
    <!-- SYNC -->
    <rect x="758" y="220" width="108" height="26" rx="13"
      fill="#00FFFF" fill-opacity="0.05" stroke="#00FFFF" stroke-width="1" opacity="0.70"/>
    <text x="812" y="237" text-anchor="middle" fill="#00FFFF" opacity="0.92">SYNC</text>
  </g>

  <!-- ── BOTTOM DISCLAIMER ─────────────────────────────────────────── -->
  <text x="512" y="490"
    font-family="Arial,sans-serif" font-size="10" text-anchor="middle" letter-spacing="4"
    fill="#FFFFFF" opacity="0.18">NO ADS  ·  NO SUBSCRIPTION  ·  YOUR DATA, YOUR RULES</text>
</svg>
